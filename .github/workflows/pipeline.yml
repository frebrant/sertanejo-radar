name: Sertanejo Radar Pipeline

on:
  schedule:
    # A cada 30 min entre 8h-21h horário Brasília (UTC-3 = 11h-00h UTC).
    # GitHub Actions costuma atrasar/pular crons em janelas com muita carga,
    # então definimos cada slot explicitamente em vez de '*/30 11-23 * * *'.
    # 8h, 8:30, 9h, 9:30 ... 20:30, 21h Brasília:
    - cron: '0 11 * * *'    # 08:00 BR
    - cron: '30 11 * * *'   # 08:30 BR
    - cron: '0 12 * * *'    # 09:00 BR
    - cron: '30 12 * * *'   # 09:30 BR
    - cron: '0 13 * * *'    # 10:00 BR
    - cron: '30 13 * * *'   # 10:30 BR
    - cron: '0 14 * * *'    # 11:00 BR
    - cron: '30 14 * * *'   # 11:30 BR
    - cron: '0 15 * * *'    # 12:00 BR
    - cron: '30 15 * * *'   # 12:30 BR
    - cron: '0 16 * * *'    # 13:00 BR
    - cron: '30 16 * * *'   # 13:30 BR
    - cron: '0 17 * * *'    # 14:00 BR
    - cron: '30 17 * * *'   # 14:30 BR
    - cron: '0 18 * * *'    # 15:00 BR
    - cron: '30 18 * * *'   # 15:30 BR
    - cron: '0 19 * * *'    # 16:00 BR
    - cron: '30 19 * * *'   # 16:30 BR
    - cron: '0 20 * * *'    # 17:00 BR
    - cron: '30 20 * * *'   # 17:30 BR
    - cron: '0 21 * * *'    # 18:00 BR
    - cron: '30 21 * * *'   # 18:30 BR
    - cron: '0 22 * * *'    # 19:00 BR
    - cron: '30 22 * * *'   # 19:30 BR
    - cron: '0 23 * * *'    # 20:00 BR
    - cron: '30 23 * * *'   # 20:30 BR
    - cron: '0 0 * * *'     # 21:00 BR
  workflow_dispatch: {}   # botão "Run workflow" no GitHub

concurrency:
  # Garante que apenas 1 run roda por vez. Se outro for disparado, espera o
  # anterior terminar (NÃO cancela). Crítico para evitar race condition no
  # data/radar.db que causa renotificação de matérias já enviadas.
  group: sertanejo-radar-pipeline
  cancel-in-progress: false

permissions:
  contents: write          # precisa pra commitar data/radar.db de volta no repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit updated SQLite
        run: |
          set -e
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"

          if [ ! -f data/radar.db ]; then
            echo "Sem radar.db pra commitar."
            exit 0
          fi

          git add -f data/radar.db
          if git diff --staged --quiet; then
            echo "Sem mudanças no banco."
            exit 0
          fi

          git commit -m "auto: pipeline run $(date -u +%Y-%m-%dT%H:%MZ)"

          # Com `concurrency` configurado no top do workflow, runs nunca rodam
          # em paralelo, então este push deve sempre ser fast-forward.
          # Em caso raro de conflito (push manual no repo, etc.), tenta uma
          # rebase preservando o radar.db local (`-X ours`) — preserva nossas
          # marcações de `notified` que evitam reenvio Telegram.
          if ! git push; then
            echo "Push falhou — tentando rebase preservando radar.db local..."
            git pull --rebase -X ours origin main || git rebase --abort
            git push
          fi
