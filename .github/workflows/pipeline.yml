name: Sertanejo Radar Pipeline

on:
  schedule:
    # A cada 30 minutos (UTC). GitHub pode atrasar alguns minutos em horários de pico.
    - cron: '*/30 * * * *'
  workflow_dispatch: {}   # botão "Run workflow" no GitHub

concurrency:
  group: pipeline
  cancel-in-progress: false

permissions:
  contents: write          # precisa pra commitar data/radar.db de volta no repo

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/run_pipeline.py

      - name: Commit updated SQLite (if changed)
        run: |
          git config user.name "radar-bot"
          git config user.email "radar-bot@users.noreply.github.com"
          git add data/radar.db data/_instance_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Sem mudanças no banco."
          else
            git commit -m "auto: pipeline run $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
